# Example configuration for kuafu-llm-infra
# Copy this file and modify for your environment.

llm_stability:

  # --- Provider definitions ---
  providers:
    openai-next:
      api_key: "sk-xxx"
      openai_base_url: "https://api.openai-next.com/v1"
      anthropic_base_url: "https://api.openai-next.com"
      ping_model: "gpt-4.1-2025-04-14"
      priority: 1
      enabled: true
      model_mapping:
        claude-opus-4-5-20251101: claude-opus-4-6

    ppio:
      api_key: "sk-yyy"
      openai_base_url: "https://api.ppinfra.com/openai/v1"
      anthropic_base_url: "https://api.ppinfra.com/anthropic"
      ping_model: "deepseek-chat"
      priority: 2
      enabled: true
      model_mapping: {}

    volces:
      api_key: "sk-zzz"
      openai_base_url: "https://ark.cn-beijing.volces.com/api/v3"
      ping_model: "deepseek-v3-2-251201"
      priority: 3
      enabled: true

  # --- Business key strategies ---
  strategies:
    # Requirement clarification — streaming, user-facing
    requirement_clarify:
      mode: stream
      primary:
        model: claude-opus-4-5-20251101
        providers: [openai-next, ppio]
      fallback:
        - model: gpt-4.1-2025-04-14
          providers: [openai-next, ppio]
        - model: deepseek-v3-2-251201
          providers: [volces]
      timeout:
        ttft: 8            # First token timeout (seconds)
        chunk_gap: 15       # Mid-stream stall timeout (seconds)
        total: 120          # Total timeout (seconds)
      empty_frame_threshold: 5
      slow_speed_threshold: 5.0  # tokens/sec

    # Code generation — non-streaming, internal
    code_generation:
      mode: block
      primary:
        model: deepseek-v3-2-251201
        providers: [volces, ppio]
      fallback:
        - model: gpt-4.1-2025-04-14
          providers: [openai-next]
      timeout:
        total: 60

    # Chat — streaming, general purpose
    chat:
      mode: stream
      primary:
        model: gpt-4.1-2025-04-14
        providers: [openai-next, ppio]
      fallback:
        - model: deepseek-v3-2-251201
          providers: [volces]
      timeout:
        ttft: 6
        chunk_gap: 10

  # --- Health check & speed probing (combined) ---
  health_check:
    interval: 20            # Seconds between probe rounds
    failure_threshold: 3    # Consecutive failures → cooldown
    recovery_threshold: 3   # Consecutive successes → recovery
    timeout: 10             # Per-probe timeout (seconds)
    probe_max_tokens: 5     # Max tokens for probe (controls cost)
    stagger_interval: 2     # Seconds between individual probes
    cooldown: 60            # Cooldown period (seconds)

  # --- Metrics ---
  metrics:
    enabled: true
    backend: simple         # "simple" (in-memory) | "prometheus"
    # port: 9091            # Uncomment to enable Prometheus /metrics endpoint

  # --- Alerting ---
  alert:
    channels:
      - type: log           # Always log alerts
      # - type: feishu
      #   webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/xxx"
      # - type: webhook
      #   url: "https://your-webhook.com/alert"
    rules:
      silence_seconds: 60   # Suppress duplicate alerts within window

  # --- State backend ---
  state_backend:
    type: memory            # "memory" (default) | "redis"
    # redis:
    #   url: "redis://localhost:6379/0"
    #   key_prefix: "llm_infra:"
