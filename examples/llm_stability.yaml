# Example configuration for kuafu-llm-infra
# Copy this file and modify for your environment.

llm_stability:

  # === Provider credentials ===
  # Each provider can expose multiple protocol endpoints (openai, anthropic, etc.)
  providers:
    openai-next:
      api_key: "sk-xxx"
      endpoints:
        openai:
          base_url: "https://api.openai-next.com/v1"
        anthropic:
          base_url: "https://api.openai-next.com/anthropic/v1"

    ppio:
      api_key: "sk-yyy"
      endpoints:
        openai:
          base_url: "https://api.ppinfra.com/openai/v1"
        anthropic:
          base_url: "https://api.ppinfra.com/anthropic/v1"

    volces:
      api_key: "sk-zzz"
      endpoints:
        openai:
          base_url: "https://ark.cn-beijing.volces.com/api/v3"

  # === Model definitions (model is the first-class citizen) ===
  # Key = official/canonical model ID
  # Each provider entry specifies the endpoint type and actual model_id.
  # If model_id is omitted, it defaults to the key.
  models:
    claude-opus-4-5-20251101:
      providers:
        - provider: openai-next
          endpoint: openai
          priority: 1
          probe: true
          model_id: "claude-opus-4-5-20251101"
        - provider: ppio
          endpoint: anthropic
          model_id: "claude-opus-4-5-20251101"
          priority: 2
          probe: true

    gpt-4.1-2025-04-14:
      providers:
        - provider: openai-next
          endpoint: openai
          priority: 1
          probe: true
        - provider: ppio
          endpoint: openai
          priority: 2
          probe: true

    deepseek-v3-2-251201:
      providers:
        - provider: volces
          endpoint: openai
          priority: 1
          probe: true
        - provider: ppio
          endpoint: openai
          model_id: "deepseek-chat"      # ppio uses "deepseek-chat"
          priority: 2
          probe: true

  # === Business key strategies ===
  # primary / fallback reference canonical model IDs (keys in models)

  #todo 手动指定权重
  #todo 固定的 fallback
  #todo cache token nums
  #todo 指定分数下不及格
  #
  strategies:
    # Requirement clarification — streaming, user-facing
    requirement_clarify:
      primary: claude-opus-4-5-20251101
      fallback:
        - gpt-4.1-2025-04-14
        - deepseek-v3-2-251201
      timeout:
        ttft: 8
        chunk_gap: 15
        per_request: 120
        total: 180
      empty_frame_threshold: 5
      slow_speed_threshold: 5.0

    # Code generation — non-streaming, internal
    code_generation:
      primary: deepseek-v3-2-251201
      fallback:
        - gpt-4.1-2025-04-14
      timeout:
        per_request: 60
        total: 120

    # Chat — streaming, general purpose
    chat:
      primary: gpt-4.1-2025-04-14
      fallback:
        - deepseek-v3-2-251201
      timeout:
        ttft: 6
        chunk_gap: 10
        per_request: 60
        total: 90

  # === Health check & probing ===
  health_check:
    interval: 20
    failure_threshold: 3
    recovery_threshold: 3
    timeout: 10
    probe_max_tokens: 5
    stagger_interval: 2
    cooldown: 60

  # === Metrics ===
  metrics:
    enabled: true
    backend: simple           # "simple" (in-memory) | "prometheus"
    label_keys:               # Custom label names (deprecated, no longer in Prometheus)
      - user_id
      - module

  # === Recording (ClickHouse high-dimensional data collection) ===
  recording:
    enabled: true
    clickhouse:
      host: "your-clickhouse-host"
      database: "llm_metrics"
      table: "llm_request_metrics"
      label_columns:
        - app_id
        - user_id
        - conversation_id
        - request_id
      # port: 8123
      # username: "default"
      # password: ""
      # secure: false
    batch_size: 500
    flush_interval: 2.0
    queue_size: 50000

  # === Alerting ===
  alert:
    channels:
      - type: log
      # - type: feishu
      #   webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/xxx"
      # - type: webhook
      #   url: "https://your-webhook.com/alert"
    rules:
      silence_seconds: 60

  # === State backend ===
  state_backend:
    type: memory              # "memory" (default) | "redis"
    # redis:
    #   url: "redis://localhost:6379/0"
    #   key_prefix: "llm_infra:"
