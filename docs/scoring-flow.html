<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>kuafu-llm-infra - 评分与请求流转全景图</title>
<style>
  body { margin: 0; background: #0f1117; display: flex; justify-content: center; padding: 40px 20px; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 2920" width="1400" height="2920" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1117"/><stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#1a2940"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3d2e"/><stop offset="100%" stop-color="#162d23"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d2e1a"/><stop offset="100%" stop-color="#2d2316"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1a3d"/><stop offset="100%" stop-color="#231630"/>
    </linearGradient>
    <linearGradient id="scoreCardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2333"/><stop offset="100%" stop-color="#151b28"/>
    </linearGradient>
    <linearGradient id="scorerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#164e63"/><stop offset="100%" stop-color="#134152"/>
    </linearGradient>
    <linearGradient id="alertRedGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d1a1a"/><stop offset="100%" stop-color="#2d1616"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <marker id="arrowBlueM" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/></marker>
    <marker id="arrowGreenM" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="arrowOrangeM" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker>
    <marker id="arrowRedM" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
    <marker id="arrowPurpleM" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#a855f7"/></marker>
    <marker id="arrowWhiteM" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#94a3b8"/></marker>
    <marker id="arrowCyanM" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#06b6d4"/></marker>
    <marker id="arrowPromM" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#e65100"/></marker>
  </defs>

  <rect width="1400" height="2920" fill="url(#bgGrad)"/>

  <!-- ================================================================== -->
  <!-- TITLE -->
  <!-- ================================================================== -->
  <text x="700" y="50" text-anchor="middle" fill="#f1f5f9" font-size="28" font-weight="700" letter-spacing="2">评分 · 指标 · 监控 全景图</text>
  <text x="700" y="76" text-anchor="middle" fill="#64748b" font-size="14">kuafu-llm-infra  |  每个 (model x provider) 独立维护 ScoreCard + MetricsCollector 双写</text>

  <!-- ================================================================== -->
  <!-- SECTION 1: DATA SOURCES -->
  <!-- ================================================================== -->
  <text x="60" y="122" fill="#94a3b8" font-size="13" font-weight="600" letter-spacing="1">DATA SOURCES — 两条数据通路</text>
  <line x1="305" y1="118" x2="1340" y2="118" stroke="#1e293b" stroke-width="1"/>

  <!-- Left: Real-time Request -->
  <g filter="url(#shadow)">
    <rect x="60" y="140" width="620" height="340" rx="12" fill="url(#blueGrad)" stroke="#2563eb" stroke-width="1.5"/>
  </g>
  <circle cx="90" cy="167" r="10" fill="#3b82f6" opacity="0.3"/>
  <circle cx="90" cy="167" r="5" fill="#3b82f6"/>
  <text x="108" y="172" fill="#60a5fa" font-size="16" font-weight="700">实时业务请求</text>
  <text x="455" y="172" fill="#475569" font-size="12">RequestRecorder</text>

  <!-- Success -->
  <rect x="80" y="190" width="285" height="272" rx="8" fill="#0f1117" fill-opacity="0.5" stroke="#1e3a5f" stroke-width="1"/>
  <text x="95" y="213" fill="#22c55e" font-size="13" font-weight="600">SUCCESS</text>
  <rect x="90" y="224" width="265" height="88" rx="6" fill="#0d1520" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="100" y="241" fill="#60a5fa" font-size="10" font-weight="600">写入 ScoreCard (影响评分)</text>
  <text x="100" y="258" fill="#cbd5e1" font-size="10">  Scorer.record_success(ttft, tps, duration)</text>
  <text x="100" y="274" fill="#94a3b8" font-size="9">  → 滑动窗口追加 success 记录</text>
  <text x="100" y="290" fill="#94a3b8" font-size="9">  → consecutive_failures 重置为 0</text>
  <text x="100" y="306" fill="#94a3b8" font-size="9">  → 影响: 成功率↑ 稳定性↑ 速度分更新</text>
  <rect x="90" y="320" width="265" height="130" rx="6" fill="#0d1520" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="100" y="337" fill="#22d3ee" font-size="10" font-weight="600">写入 MetricsCollector (可观测性)</text>
  <circle cx="103" cy="353" r="3" fill="#06b6d4"/><text x="112" y="357" fill="#cbd5e1" font-size="10">llm_request_total  {status="success"}</text>
  <circle cx="103" cy="371" r="3" fill="#06b6d4"/><text x="112" y="375" fill="#cbd5e1" font-size="10">llm_request_duration_seconds</text>
  <circle cx="103" cy="389" r="3" fill="#06b6d4"/><text x="112" y="393" fill="#cbd5e1" font-size="10">llm_ttft_seconds</text>
  <circle cx="103" cy="407" r="3" fill="#06b6d4"/><text x="112" y="411" fill="#cbd5e1" font-size="10">llm_tokens_per_second</text>
  <circle cx="103" cy="425" r="3" fill="#06b6d4"/><text x="112" y="429" fill="#cbd5e1" font-size="10">llm_input_tokens / output_tokens</text>
  <text x="100" y="446" fill="#475569" font-size="9">标签: model + provider + label_keys</text>

  <!-- Failure -->
  <rect x="382" y="190" width="280" height="272" rx="8" fill="#0f1117" fill-opacity="0.5" stroke="#1e3a5f" stroke-width="1"/>
  <text x="397" y="213" fill="#ef4444" font-size="13" font-weight="600">FAILURE</text>
  <rect x="392" y="224" width="260" height="88" rx="6" fill="#0d1520" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="402" y="241" fill="#60a5fa" font-size="10" font-weight="600">写入 ScoreCard (影响评分)</text>
  <text x="402" y="258" fill="#cbd5e1" font-size="10">  Scorer.record_failure(reason)</text>
  <text x="402" y="274" fill="#94a3b8" font-size="9">  → 滑动窗口追加 failure 记录</text>
  <text x="402" y="290" fill="#94a3b8" font-size="9">  → consecutive_failures += 1</text>
  <text x="402" y="306" fill="#ef4444" font-size="9" opacity="0.8">  → 影响: 成功率↓ 稳定性↓ 可能触发冷却</text>
  <rect x="392" y="320" width="260" height="80" rx="6" fill="#0d1520" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="402" y="337" fill="#22d3ee" font-size="10" font-weight="600">写入 MetricsCollector (可观测性)</text>
  <circle cx="405" cy="353" r="3" fill="#06b6d4"/><text x="414" y="357" fill="#cbd5e1" font-size="10">llm_request_total  {status="error"}</text>
  <circle cx="405" cy="371" r="3" fill="#06b6d4"/><text x="414" y="375" fill="#cbd5e1" font-size="10">llm_strategy_triggered_total</text>
  <text x="402" y="396" fill="#475569" font-size="9">标签: + strategy (触发的策略名)</text>
  <rect x="392" y="408" width="260" height="46" rx="6" fill="#1a0808" stroke="#ef4444" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="402" y="425" fill="#ef4444" font-size="10" font-weight="600">发送告警 AlertDispatcher</text>
  <text x="402" y="441" fill="#fca5a5" font-size="9">provider_degraded:{reason}  level=warning</text>

  <!-- Right: Background Probe -->
  <g filter="url(#shadow)">
    <rect x="720" y="140" width="620" height="340" rx="12" fill="url(#greenGrad)" stroke="#16a34a" stroke-width="1.5"/>
  </g>
  <circle cx="750" cy="167" r="10" fill="#22c55e" opacity="0.3"/>
  <circle cx="750" cy="167" r="5" fill="#22c55e"/>
  <text x="768" y="172" fill="#4ade80" font-size="16" font-weight="700">后台健康探测</text>
  <text x="1160" y="172" fill="#475569" font-size="12">HealthChecker</text>

  <!-- Probe Success -->
  <rect x="740" y="190" width="280" height="272" rx="8" fill="#0f1117" fill-opacity="0.5" stroke="#1a3d2e" stroke-width="1"/>
  <text x="755" y="213" fill="#22c55e" font-size="13" font-weight="600">PROBE SUCCESS</text>
  <text x="755" y="232" fill="#64748b" font-size="10">每 20s, max_tokens=5</text>
  <rect x="750" y="242" width="260" height="74" rx="6" fill="#0d1520" stroke="#16a34a" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="760" y="259" fill="#4ade80" font-size="10" font-weight="600">写入 ScoreCard (影响评分)</text>
  <text x="760" y="276" fill="#cbd5e1" font-size="10">  ScoreCard.update_probe(health=True)</text>
  <text x="760" y="292" fill="#94a3b8" font-size="9">  → health=true, probe_ttft_ms=实测值</text>
  <text x="760" y="308" fill="#94a3b8" font-size="9">  → 影响: 健康门控通过, 冷启动速度分</text>
  <rect x="750" y="324" width="260" height="80" rx="6" fill="#0d1520" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="760" y="341" fill="#22d3ee" font-size="10" font-weight="600">写入 MetricsCollector (可观测性)</text>
  <circle cx="763" cy="357" r="3" fill="#06b6d4"/><text x="772" y="361" fill="#cbd5e1" font-size="10">llm_provider_health = 1</text>
  <circle cx="763" cy="375" r="3" fill="#06b6d4"/><text x="772" y="379" fill="#cbd5e1" font-size="10">llm_probe_ttft_seconds</text>
  <circle cx="763" cy="393" r="3" fill="#06b6d4"/><text x="772" y="397" fill="#cbd5e1" font-size="10">llm_probe_total  {status="success"}</text>

  <!-- Probe Failure -->
  <rect x="1040" y="190" width="280" height="272" rx="8" fill="#0f1117" fill-opacity="0.5" stroke="#1a3d2e" stroke-width="1"/>
  <text x="1055" y="213" fill="#ef4444" font-size="13" font-weight="600">PROBE FAILURE</text>
  <text x="1055" y="232" fill="#64748b" font-size="10">超时 / 异常</text>
  <rect x="1050" y="242" width="260" height="74" rx="6" fill="#0d1520" stroke="#16a34a" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="1060" y="259" fill="#4ade80" font-size="10" font-weight="600">写入 ScoreCard (影响评分)</text>
  <text x="1060" y="276" fill="#cbd5e1" font-size="10">  ScoreCard.update_probe(health=False)</text>
  <text x="1060" y="292" fill="#ef4444" font-size="9" opacity="0.8">  → health=false → 健康门控拦截</text>
  <text x="1060" y="308" fill="#ef4444" font-size="9" opacity="0.8">  → score=0, 提供商被完全排除</text>
  <rect x="1050" y="324" width="260" height="62" rx="6" fill="#0d1520" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="1060" y="341" fill="#22d3ee" font-size="10" font-weight="600">写入 MetricsCollector (可观测性)</text>
  <circle cx="1063" cy="357" r="3" fill="#06b6d4"/><text x="1072" y="361" fill="#cbd5e1" font-size="10">llm_provider_health = 0</text>
  <circle cx="1063" cy="375" r="3" fill="#06b6d4"/><text x="1072" y="379" fill="#cbd5e1" font-size="10">llm_probe_total  {status="error"}</text>
  <rect x="1050" y="394" width="260" height="46" rx="6" fill="#1a0808" stroke="#ef4444" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="1060" y="411" fill="#ef4444" font-size="10" font-weight="600">发送告警 AlertDispatcher</text>
  <text x="1060" y="427" fill="#fca5a5" font-size="9">probe_failed  level=warning</text>

  <!-- ================================================================== -->
  <!-- Arrows to ScoreCard -->
  <!-- ================================================================== -->
  <path d="M 340 480 L 340 530 Q 340 545 354 545 L 478 545" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowBlueM)" stroke-dasharray="6,3"/>
  <text x="356" y="522" fill="#3b82f6" font-size="10" font-weight="600">写入滑动窗口</text>
  <path d="M 1020 480 L 1020 530 Q 1020 545 1006 545 L 910 545" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowGreenM)" stroke-dasharray="6,3"/>
  <text x="938" y="522" fill="#22c55e" font-size="10" font-weight="600">写入探测数据</text>

  <!-- ================================================================== -->
  <!-- SECTION 2: SCORE CARD -->
  <!-- ================================================================== -->
  <text x="60" y="530" fill="#94a3b8" font-size="13" font-weight="600" letter-spacing="1">SCORE CARD</text>
  <line x1="165" y1="526" x2="395" y2="526" stroke="#1e293b" stroke-width="1"/>

  <g filter="url(#shadow)">
    <rect x="480" y="520" width="430" height="260" rx="14" fill="url(#scoreCardGrad)" stroke="#334155" stroke-width="2"/>
  </g>
  <rect x="590" y="530" width="210" height="30" rx="15" fill="#334155"/>
  <text x="695" y="550" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">ScoreCard</text>
  <text x="695" y="573" text-anchor="middle" fill="#64748b" font-size="11">每个 (model x provider) 独立一份</text>

  <rect x="500" y="587" width="190" height="176" rx="8" fill="#1e293b" stroke="#2563eb" stroke-width="1" stroke-opacity="0.5"/>
  <text x="510" y="608" fill="#60a5fa" font-size="12" font-weight="600">来自实时请求</text>
  <line x1="510" y1="615" x2="680" y2="615" stroke="#2563eb" stroke-width="0.5" opacity="0.3"/>
  <text x="515" y="635" fill="#94a3b8" font-size="11">滑动窗口</text>
  <text x="515" y="651" fill="#cbd5e1" font-size="10">  最近 20 条 / 300 秒</text>
  <text x="515" y="667" fill="#cbd5e1" font-size="10">  每条: success, ttft, tps</text>
  <line x1="515" y1="677" x2="680" y2="677" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="515" y="695" fill="#94a3b8" font-size="11">consecutive_failures</text>
  <text x="515" y="711" fill="#cbd5e1" font-size="10">  成功→0, 失败→累加</text>
  <line x1="515" y1="721" x2="680" y2="721" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="515" y="739" fill="#94a3b8" font-size="11">last_failure_time</text>
  <text x="515" y="755" fill="#cbd5e1" font-size="10">  冷却倒计时判断</text>

  <rect x="705" y="587" width="185" height="176" rx="8" fill="#1e293b" stroke="#16a34a" stroke-width="1" stroke-opacity="0.5"/>
  <text x="715" y="608" fill="#4ade80" font-size="12" font-weight="600">来自后台探测</text>
  <line x1="715" y1="615" x2="880" y2="615" stroke="#16a34a" stroke-width="0.5" opacity="0.3"/>
  <text x="720" y="635" fill="#94a3b8" font-size="11">health</text>
  <text x="720" y="651" fill="#cbd5e1" font-size="10">  true / false</text>
  <text x="720" y="667" fill="#cbd5e1" font-size="10">  控制健康门控</text>
  <line x1="720" y1="677" x2="880" y2="677" stroke="#1a3d2e" stroke-width="0.5"/>
  <text x="720" y="695" fill="#94a3b8" font-size="11">probe_ttft_ms</text>
  <text x="720" y="711" fill="#cbd5e1" font-size="10">  冷启动/混合时用</text>
  <line x1="720" y1="721" x2="880" y2="721" stroke="#1a3d2e" stroke-width="0.5"/>
  <text x="720" y="739" fill="#94a3b8" font-size="11">probe_time</text>
  <text x="720" y="755" fill="#cbd5e1" font-size="10">  最近探测时间</text>

  <!-- ================================================================== -->
  <!-- Arrow ScoreCard → Scorer -->
  <!-- ================================================================== -->
  <path d="M 695 780 L 695 830" stroke="#f59e0b" stroke-width="2.5" fill="none" marker-end="url(#arrowOrangeM)"/>
  <text x="710" y="812" fill="#f59e0b" font-size="10">读取评分</text>

  <!-- ================================================================== -->
  <!-- SECTION 3: SCORER -->
  <!-- ================================================================== -->
  <text x="60" y="840" fill="#94a3b8" font-size="13" font-weight="600" letter-spacing="1">SCORER</text>
  <line x1="120" y1="836" x2="1340" y2="836" stroke="#1e293b" stroke-width="1"/>

  <g filter="url(#shadow)">
    <rect x="300" y="845" width="790" height="350" rx="14" fill="#1c1c1c" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>
  <rect x="545" y="853" width="300" height="34" rx="17" fill="url(#scorerGrad)"/>
  <text x="695" y="875" text-anchor="middle" fill="#1c1c1c" font-size="15" font-weight="700">Scorer.rank_providers()</text>

  <text x="330" y="913" fill="#ef4444" font-size="14" font-weight="700">STEP 1  健康门控</text>
  <text x="330" y="933" fill="#94a3b8" font-size="11">任一条件不满足 → score = 0, 提供商直接排除</text>
  <rect x="330" y="945" width="340" height="52" rx="6" fill="#1a0a0a" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <text x="345" y="965" fill="#fca5a5" font-size="12">health == false</text>
  <text x="345" y="983" fill="#64748b" font-size="10">来自最近一次后台探测</text>
  <text x="598" y="973" fill="#ef4444" font-size="12" font-weight="600">→ 排除</text>
  <rect x="690" y="945" width="380" height="52" rx="6" fill="#1a0a0a" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <text x="705" y="965" fill="#fca5a5" font-size="12">consecutive_failures >= 3  且  冷却未过</text>
  <text x="705" y="983" fill="#64748b" font-size="10">来自实时请求连续失败, cooldown=60s</text>
  <text x="998" y="973" fill="#ef4444" font-size="12" font-weight="600">→ 排除</text>

  <text x="330" y="1025" fill="#f59e0b" font-size="14" font-weight="700">STEP 2  四维复合评分</text>
  <rect x="330" y="1039" width="740" height="30" rx="6" fill="#1a1500" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="695" y="1059" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600" font-family="monospace">Score = 0.25 x Priority + 0.30 x Speed + 0.35 x SuccessRate + 0.10 x Stability</text>

  <rect x="330" y="1081" width="170" height="96" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="345" y="1103" fill="#a78bfa" font-size="12" font-weight="700">优先级 (25%)</text>
  <text x="345" y="1123" fill="#cbd5e1" font-size="10">1 / priority</text>
  <line x1="345" y1="1133" x2="488" y2="1133" stroke="#334155" stroke-width="0.5"/>
  <text x="345" y="1151" fill="#64748b" font-size="10">来源: 配置文件</text>
  <text x="345" y="1167" fill="#64748b" font-size="10">priority=1 → 1.0</text>

  <rect x="515" y="1081" width="190" height="96" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="530" y="1103" fill="#60a5fa" font-size="12" font-weight="700">速度 (30%)</text>
